name: Build Next.js with Secrets

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 需与原项目一致

      # 关键步骤：动态生成 .env 文件
      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_PROJECT_API=${{ secrets.PROJECT_API_URL }}" > .env
          # 如果需要其他变量，继续追加（示例）：
          # echo "ANOTHER_VAR=value" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # 可选：上传构建产物供下载
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: nextjs-build
          path: .next/  # Next.js 默认输出目录
